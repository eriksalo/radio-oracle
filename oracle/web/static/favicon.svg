<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#0a0e08"/>
  <!-- radio body -->
  <rect x="4" y="10" width="24" height="16" rx="2" fill="none" stroke="#30ff50" stroke-width="1.5"/>
  <!-- speaker grille lines -->
  <line x1="7" y1="15" x2="18" y2="15" stroke="#30ff50" stroke-width="1" opacity="0.7"/>
  <line x1="7" y1="18" x2="18" y2="18" stroke="#30ff50" stroke-width="1" opacity="0.7"/>
  <line x1="7" y1="21" x2="18" y2="21" stroke="#30ff50" stroke-width="1" opacity="0.7"/>
  <!-- tuning knob -->
  <circle cx="23" cy="18" r="3" fill="none" stroke="#30ff50" stroke-width="1.2"/>
  <circle cx="23" cy="18" r="0.8" fill="#30ff50"/>
  <!-- antenna -->
  <line x1="10" y1="10" x2="6" y2="3" stroke="#30ff50" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="6" cy="3" r="1" fill="#30ff50" opacity="0.8"/>
  <!-- glow hint -->
  <rect x="4" y="10" width="24" height="16" rx="2" fill="none" stroke="#30ff50" stroke-width="0.5" opacity="0.3" filter="url(#glow)"/>
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
